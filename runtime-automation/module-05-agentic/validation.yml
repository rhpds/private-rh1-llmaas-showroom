---
- name: Module 5 Validation — System Administration with Agentic AI
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    model_internal_url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000"
  tasks:
    # -------------------------------------------------------
    # Check 1 — Model endpoint reachable
    # -------------------------------------------------------
    - name: Check Task 1 — qwen model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Check 2 — OCP MCP server (TCP — shared lls-demo namespace)
    # -------------------------------------------------------
    - name: Check Task 2 — OCP MCP server
      ansible.builtin.wait_for:
        host: "ocp-mcp-server.lls-demo.svc.cluster.local"
        port: 8080
        timeout: 5
      register: r_ocp_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Check 3 — Slack MCP server (TCP)
    # -------------------------------------------------------
    - name: Check Task 3 — Slack MCP server
      ansible.builtin.wait_for:
        host: "slack-mcp-server.lls-demo.svc.cluster.local"
        port: 80
        timeout: 5
      register: r_slack_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Build results
    # -------------------------------------------------------
    - name: Build task results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_model_endpoint.status | default(0) == 200 }}"
        _task2_ok: "{{ r_ocp_mcp is not failed }}"
        _task3_ok: "{{ r_slack_mcp is not failed }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok and _task3_ok }}"
        pass_msg: |
          ✅ Task 1: Model endpoint qwen3-4b-instruct is reachable
          ✅ Task 2: OCP MCP server is reachable (lls-demo)
          ✅ Task 3: Slack MCP server is reachable (lls-demo)
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Task 1: Model endpoint qwen3-4b-instruct {{ 'is reachable' if _task1_ok else 'is NOT reachable — contact cluster admin' }}
          {{ '✅' if _task2_ok else '❌' }} Task 2: OCP MCP server {{ 'is reachable' if _task2_ok else 'is NOT reachable in lls-demo — contact cluster admin' }}
          {{ '✅' if _task3_ok else '❌' }} Task 3: Slack MCP server {{ 'is reachable' if _task3_ok else 'is NOT reachable in lls-demo — contact cluster admin' }}
