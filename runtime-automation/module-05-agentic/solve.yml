---
- name: Module 5 Solve — System Administration with Agentic AI
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    model_internal_url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000"
    llama_stack_url: "http://lsd-genai-playground-service.{{ student_user }}.svc.cluster.local:8321"
    ocp_mcp_url: "http://ocp-mcp-server.lls-demo.svc.cluster.local:8080"
    slack_mcp_url: "http://slack-mcp-server.lls-demo.svc.cluster.local:80"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable
    # -------------------------------------------------------
    - name: Verify qwen model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Check Llama Stack playground service
    # -------------------------------------------------------
    - name: Check Llama Stack playground service is reachable
      ansible.builtin.uri:
        url: "{{ llama_stack_url }}/v1/models"
        method: GET
        return_content: true
        timeout: 10
      register: r_llama_stack
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Check OCP MCP server (TCP port check — SSE endpoints stream forever)
    # -------------------------------------------------------
    - name: Check OCP MCP server is reachable
      ansible.builtin.wait_for:
        host: "ocp-mcp-server.lls-demo.svc.cluster.local"
        port: 8080
        timeout: 5
      register: r_ocp_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Check Slack MCP server (TCP port check)
    # -------------------------------------------------------
    - name: Check Slack MCP server is reachable
      ansible.builtin.wait_for:
        host: "slack-mcp-server.lls-demo.svc.cluster.local"
        port: 80
        timeout: 5
      register: r_slack_mcp
      ignore_errors: true

    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          Llama Stack playground: {{ 'reachable' if r_llama_stack.status | default(0) == 200 else 'NOT reachable' }}
          OCP MCP server: {{ 'reachable' if r_ocp_mcp is not failed else 'NOT reachable' }}
          Slack MCP server: {{ 'reachable' if r_slack_mcp is not failed else 'NOT reachable' }}

          ⚠️ MANUAL STEPS REQUIRED — this module uses the RHOAI Playground:
            1. Go to OpenShift AI → Gen AI Studio → AI asset endpoints
            2. Change project to your Workspace namespace
            3. Select MCP servers and click "Try in Playground"
            4. Authorize both MCP servers (click lock icons)
            5. Chat: "List all pods in the wksp-{{ student_user }} namespace"
            6. Chat: "List all Slack channels in our Slack workspace"
            7. Chat: "Post a message to the #rh1-2026 channel"
