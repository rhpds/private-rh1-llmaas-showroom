---
- name: Module 5 Solve — System Administration with Agentic AI
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    model_internal_url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable
    # -------------------------------------------------------
    - name: Verify qwen model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Check OCP MCP server (TCP — SSE endpoints stream forever)
    #   Shared namespace: lls-demo (all students share these MCP servers)
    # -------------------------------------------------------
    - name: Check OCP MCP server is reachable
      ansible.builtin.wait_for:
        host: "ocp-mcp-server.lls-demo.svc.cluster.local"
        port: 8080
        timeout: 5
      register: r_ocp_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Check Slack MCP server (TCP)
    # -------------------------------------------------------
    - name: Check Slack MCP server is reachable
      ansible.builtin.wait_for:
        host: "slack-mcp-server.lls-demo.svc.cluster.local"
        port: 80
        timeout: 5
      register: r_slack_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Check Llama Stack playground pod is running (k8s — direct API blocked by NetworkPolicy)
    # -------------------------------------------------------
    - name: Check lsd-genai-playground pod in student namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ student_user }}"
        label_selectors:
          - "app=llama-stack"
      register: r_playground_pod
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Call Llama Stack via k8s API server proxy (bypasses NetworkPolicy)
    #   Runner has cluster-admin — can proxy to any service via the k8s API
    # -------------------------------------------------------
    - name: Get k8s API server URL from kubeconfig
      ansible.builtin.command:
        cmd: "python3 -c \"import yaml; kc=yaml.safe_load(open('{{ k8s_kubeconfig }}')); print(kc['clusters'][0]['cluster']['server'])\""
      register: r_k8s_server
      when: k8s_kubeconfig is defined
      ignore_errors: true

    - name: Get k8s service account token
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/token
      register: r_sa_token
      ignore_errors: true

    - name: Chat with Llama Stack — list pods via OCP MCP (k8s proxy)
      ansible.builtin.uri:
        url: "{{ r_k8s_server.stdout | default('https://kubernetes.default.svc') }}/api/v1/namespaces/{{ student_user }}/services/lsd-genai-playground-service:8321/proxy/v1/chat/completions"
        method: POST
        headers:
          Content-Type: application/json
          Authorization: "Bearer {{ r_sa_token.content | default('') | b64decode }}"
        body_format: json
        body:
          model: "llama3.2:3b-instruct-fp16"
          messages:
            - role: user
              content: "List all pods in the wksp-{{ student_user }} namespace."
          max_tokens: 200
          stream: false
        validate_certs: false
        timeout: 60
      register: r_llama_chat
      ignore_errors: true

    - name: Post to Slack via Llama Stack — Slack MCP (k8s proxy)
      ansible.builtin.uri:
        url: "{{ r_k8s_server.stdout | default('https://kubernetes.default.svc') }}/api/v1/namespaces/{{ student_user }}/services/lsd-genai-playground-service:8321/proxy/v1/chat/completions"
        method: POST
        headers:
          Content-Type: application/json
          Authorization: "Bearer {{ r_sa_token.content | default('') | b64decode }}"
        body_format: json
        body:
          model: "llama3.2:3b-instruct-fp16"
          messages:
            - role: user
              content: "Post a message to the #rh1-2026 channel: Hi from {{ student_user }}"
          max_tokens: 200
          stream: false
        validate_certs: false
        timeout: 60
      register: r_slack_chat
      ignore_errors: true

    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          OCP MCP server (lls-demo): {{ 'reachable' if r_ocp_mcp is not failed else 'NOT reachable' }}
          Slack MCP server (lls-demo): {{ 'reachable' if r_slack_mcp is not failed else 'NOT reachable' }}
          Llama Stack playground ({{ student_user }}): {{ 'running' if (r_playground_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0) else 'not found' }}
          Llama Stack chat (list pods): {{ 'completed' if r_llama_chat.status | default(0) == 200 else 'failed (status=' + (r_llama_chat.status | default('N/A') | string) + ')' }}
          Slack chat (post message): {{ 'completed' if r_slack_chat.status | default(0) == 200 else 'failed (status=' + (r_slack_chat.status | default('N/A') | string) + ')' }}
