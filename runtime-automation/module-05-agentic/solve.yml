---
- name: Module 5 Solve — System Administration with Agentic AI
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    model_internal_url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable
    # -------------------------------------------------------
    - name: Verify qwen model endpoint is reachable
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Check OCP MCP server (TCP — SSE endpoints stream forever)
    #   Shared namespace: lls-demo (all students share these MCP servers)
    # -------------------------------------------------------
    - name: Check OCP MCP server is reachable
      ansible.builtin.wait_for:
        host: "ocp-mcp-server.lls-demo.svc.cluster.local"
        port: 8080
        timeout: 5
      register: r_ocp_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Check Slack MCP server (TCP)
    # -------------------------------------------------------
    - name: Check Slack MCP server is reachable
      ansible.builtin.wait_for:
        host: "slack-mcp-server.lls-demo.svc.cluster.local"
        port: 80
        timeout: 5
      register: r_slack_mcp
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Check Llama Stack playground pod is running (k8s — direct API blocked by NetworkPolicy)
    # -------------------------------------------------------
    - name: Check lsd-genai-playground pod in student namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "{{ student_user }}"
        label_selectors:
          - "app=llama-stack"
      register: r_playground_pod
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Playwright: navigate RHOAI playground, authorize MCP servers, send chat
    # -------------------------------------------------------
    - name: Run Playwright — RHOAI playground chat interactions
      ansible.builtin.script:
        executable: node
        cmd: "{{ playbook_dir }}/playwright/solve-playground.js"
      environment:
        RHOAI_URL: "https://data-science-gateway.{{ openshift_cluster_ingress_domain | default('') }}"
        USERNAME: "{{ student_user }}"
        PASSWORD: "{{ password | default('') }}"
        USER_NS: "{{ student_user }}"
        PLAYWRIGHT_BROWSERS_PATH: /app/.playwright
      register: r_playwright
      ignore_errors: true

    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          OCP MCP server (lls-demo): {{ 'reachable' if r_ocp_mcp is not failed else 'NOT reachable' }}
          Slack MCP server (lls-demo): {{ 'reachable' if r_slack_mcp is not failed else 'NOT reachable' }}
          Llama Stack playground ({{ student_user }}): {{ 'running' if (r_playground_pod.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0) else 'not found' }}
          Playground chat (Playwright): {{ 'completed' if r_playwright.rc | default(1) == 0 else 'failed — ' + (r_playwright.stderr | default('') | truncate(100)) }}
