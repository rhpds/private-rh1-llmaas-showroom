---
- name: Module 3 Solve — AI-Assisted Development
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    maas_api_url: "https://maas-api.redhat-ods-applications.svc.cluster.local:8443"
    model_internal_url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000"
    student_groups:
      - "tier-enterprise-users"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable (prerequisite)
    # -------------------------------------------------------
    - name: Verify qwen model endpoint is reachable (internal)
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Ensure user has an API key from MaaS
    # -------------------------------------------------------
    - name: Check if API key already exists for user
      ansible.builtin.uri:
        url: "{{ maas_api_url }}/v1/api-keys"
        method: GET
        headers:
          X-MaaS-Username: "{{ student_user }}"
          X-MaaS-Group: "{{ student_groups | to_json }}"
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_existing_keys
      ignore_errors: true

    - name: Generate API token for user (if none exists)
      ansible.builtin.uri:
        url: "{{ maas_api_url }}/v1/api-keys"
        method: POST
        headers:
          X-MaaS-Username: "{{ student_user }}"
          X-MaaS-Group: "{{ student_groups | to_json }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "{{ student_user }}-token"
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_generated_token
      when: >
        r_existing_keys.status | default(0) == 200 and
        (r_existing_keys.json | default([]) | length == 0)
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Test chat completion via internal model endpoint
    # -------------------------------------------------------
    - name: Test chat completion via internal model endpoint
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/chat/completions"
        method: POST
        headers:
          Content-Type: application/json
        body_format: json
        body:
          model: "qwen3-4b-instruct"
          messages:
            - role: user
              content: "Say hello in one word."
          max_tokens: 10
        return_content: true
        validate_certs: false
        timeout: 30
      register: r_chat_test
      ignore_errors: true

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          API key: {{ 'exists' if (r_existing_keys.json | default([]) | length > 0) else ('generated' if r_generated_token.status | default(0) == 200 else 'not found — generate from Gen AI Studio → AI asset endpoints → Models as a service → View → Generate API token') }}
          Chat completion test: {{ 'passed' if r_chat_test.status | default(0) == 200 else 'failed' }}

