---
- name: Module 3 Solve — AI-Assisted Development
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    maas_api_url: "https://maas-api.redhat-ods-applications.svc.cluster.local:8443"
    model_internal_url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000"
    student_groups:
      - "tier-enterprise-users"
    ingress_domain: "{{ openshift_cluster_ingress_domain | default('') }}"
    maas_gateway_url: "https://data-science-gateway.{{ ingress_domain }}/llm/qwen3-4b-instruct/v1"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify model endpoint is reachable (prerequisite)
    # -------------------------------------------------------
    - name: Verify qwen model endpoint is reachable (internal)
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Revoke existing token and issue a fresh one (need token value for config.yaml)
    # -------------------------------------------------------
    - name: Check existing API keys
      ansible.builtin.uri:
        url: "{{ maas_api_url }}/v1/api-keys"
        method: GET
        headers:
          X-MaaS-Username: "{{ student_user }}"
          X-MaaS-Group: "{{ student_groups | to_json }}"
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_existing_keys
      ignore_errors: true

    - name: Revoke existing token (need fresh token value for config.yaml)
      ansible.builtin.uri:
        url: "{{ maas_api_url }}/v1/api-keys/{{ r_existing_keys.json[0].jti }}"
        method: DELETE
        headers:
          X-MaaS-Username: "{{ student_user }}"
          X-MaaS-Group: "{{ student_groups | to_json }}"
        validate_certs: false
        timeout: 10
        status_code: [200, 204]
      when: r_existing_keys.json | default([]) | length > 0
      ignore_errors: true

    - name: Generate fresh API token
      ansible.builtin.uri:
        url: "{{ maas_api_url }}/v1/api-keys"
        method: POST
        status_code: [200, 201]
        headers:
          X-MaaS-Username: "{{ student_user }}"
          X-MaaS-Group: "{{ student_groups | to_json }}"
          Content-Type: application/json
        body_format: json
        body:
          name: "{{ student_user }}-token"
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_new_token
      ignore_errors: true

    - name: Set API token fact
      ansible.builtin.set_fact:
        maas_token: "{{ r_new_token.json.token | default('') }}"
      when: r_new_token.json is defined and r_new_token.json.token is defined

    # -------------------------------------------------------
    # Task 3 — Test chat completion via internal model endpoint
    # -------------------------------------------------------
    - name: Test chat completion via internal model endpoint
      ansible.builtin.uri:
        url: "{{ model_internal_url }}/v1/chat/completions"
        method: POST
        headers:
          Content-Type: application/json
        body_format: json
        body:
          model: "qwen3-4b-instruct"
          messages:
            - role: user
              content: "Say hello in one word."
          max_tokens: 10
        return_content: true
        validate_certs: false
        timeout: 30
      register: r_chat_test
      ignore_errors: true

    # -------------------------------------------------------
    # Task 4 — Find DevSpaces workspace pod
    # -------------------------------------------------------
    - name: Find DevSpaces workspace pod in student namespace
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        kind: Pod
        namespace: "wksp-{{ student_user }}"
      register: r_workspace_pods
      ignore_errors: true

    - name: Set workspace pod name
      ansible.builtin.set_fact:
        workspace_pod: "{{ (r_workspace_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | first).metadata.name }}"
      when: r_workspace_pods.resources | default([]) | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      ignore_errors: true

    # -------------------------------------------------------
    # Task 5 — Write ~/.continue/config.yaml into DevSpaces workspace
    # -------------------------------------------------------
    - name: Build config.yaml content
      ansible.builtin.set_fact:
        continue_config: |
          name: Local Assistant
          version: 1.0.0
          schema: v1
          models:
            - name: Qwen3-4B-Instruct
              provider: openai
              model: "qwen3-4b-instruct"
              apiBase: "{{ maas_gateway_url }}"
              apiKey: "{{ maas_token | default('') }}"
          context:
            - provider: code
            - provider: docs
            - provider: diff
            - provider: terminal
            - provider: problems
            - provider: folder
            - provider: codebase
      when: maas_token is defined and maas_token | length > 0

    - name: Debug — show workspace and config status
      ansible.builtin.debug:
        msg: "workspace_pod={{ workspace_pod | default('UNDEFINED') }} continue_config_len={{ continue_config | default('') | length }} maas_token_len={{ maas_token | default('') | length }}"

    - name: Write ~/.continue/config.yaml into DevSpaces workspace pod
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "wksp-{{ student_user }}"
        pod: "{{ workspace_pod }}"
        command: "python3 -c \"import base64,os; os.makedirs('/home/user/.continue',exist_ok=True); open('/home/user/.continue/config.yaml','w').write(base64.b64decode('{{ continue_config | b64encode }}').decode()); print('written')\""
      register: r_config_write
      when:
        - workspace_pod is defined
        - continue_config is defined
      ignore_errors: true

    - name: Debug — config write result
      ansible.builtin.debug:
        msg: "k8s_exec rc={{ r_config_write.return_code | default('N/A') }} stdout={{ r_config_write.stdout | default('N/A') }} stderr={{ r_config_write.stderr | default('N/A') }}"
      when: r_config_write is defined

    # -------------------------------------------------------
    # Report
    # -------------------------------------------------------
    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Model endpoint: {{ 'reachable' if r_model_endpoint.status | default(0) == 200 else 'NOT reachable' }}
          API token: {{ 'generated' if r_new_token.status | default(0) in [200, 201] else 'generation failed' }}
          Chat completion: {{ 'passed' if r_chat_test.status | default(0) == 200 else 'failed' }}
          DevSpaces workspace: {{ workspace_pod | default('not found') }}
          config.yaml: {{ 'written to ' + workspace_pod if (r_config_write is defined and r_config_write is not failed) else 'not written' }}
          apiBase: {{ maas_gateway_url }}
