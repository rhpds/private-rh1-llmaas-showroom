---
- name: Module 6 Solve — Usage Analytics and Reporting
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    student_user: "{{ user | default('') }}"
    grafana_url: "http://grafana-service.grafana.svc.cluster.local:3000"
    maas_api_url: "https://maas-api.redhat-ods-applications.svc.cluster.local:8443"
    student_groups:
      - "tier-enterprise-users"
  tasks:
    # -------------------------------------------------------
    # Task 1 — Verify Grafana service is reachable
    # -------------------------------------------------------
    - name: Verify Grafana service is reachable
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/health"
        method: GET
        return_content: true
        timeout: 10
      register: r_grafana
      ignore_errors: true

    # -------------------------------------------------------
    # Task 2 — Verify MaaS API has usage data for user
    # -------------------------------------------------------
    - name: Check MaaS API for user usage data
      ansible.builtin.uri:
        url: "{{ maas_api_url }}/v1/api-keys"
        method: GET
        headers:
          X-MaaS-Username: "{{ student_user }}"
          X-MaaS-Group: "{{ student_groups | to_json }}"
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_maas_usage
      ignore_errors: true

    # -------------------------------------------------------
    # Task 3 — Playwright: open Grafana MaaS Token Metrics Dashboard
    # -------------------------------------------------------
    - name: Run Playwright — open Grafana dashboard
      ansible.builtin.script:
        executable: node
        cmd: "{{ playbook_dir }}/playwright/solve-grafana.js"
      environment:
        GRAFANA_URL: "https://grafana-route-grafana.{{ openshift_cluster_ingress_domain | default('') }}"
        USERNAME: "{{ student_user }}"
        PASSWORD: "{{ password | default('') }}"
        PLAYWRIGHT_BROWSERS_PATH: /app/.playwright
      register: r_playwright
      ignore_errors: true

    - name: Report solve status
      ansible.builtin.debug:
        msg: |
          Grafana: {{ 'reachable' if r_grafana.status | default(0) == 200 else 'NOT reachable' }}
          MaaS API (user data): {{ 'available' if r_maas_usage.status | default(0) == 200 else 'NOT available' }}
          Grafana dashboard (Playwright): {{ 'opened' if r_playwright.rc | default(1) == 0 else 'failed — ' + (r_playwright.stderr | default('') | truncate(100)) }}

