---
- name: Module 2 Validation — Introduction to your environment
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check Task 1 — qwen model endpoint is reachable
      ansible.builtin.uri:
        url: "https://qwen3-4b-instruct-kserve-workload-svc.llm.svc.cluster.local:8000/v1/models"
        method: GET
        return_content: true
        validate_certs: false
        timeout: 10
      register: r_model_endpoint
      ignore_errors: true

    - name: Check Task 2 — showroom-userdata ConfigMap has required vars
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: v1
        kind: ConfigMap
        name: showroom-userdata
        namespace: "showroom-{{ student_user }}"
      register: r_userdata

    - name: Build task results
      ansible.builtin.set_fact:
        _task1_ok: "{{ r_model_endpoint.status | default(0) == 200 }}"
        _task2_ok: >-
          {{ r_userdata.resources | length > 0 and
             r_userdata.resources[0].data is defined and
             'user_data.yml' in r_userdata.resources[0].data }}

    - name: Validate all tasks
      validation_check:
        check: "{{ _task1_ok and _task2_ok }}"
        pass_msg: |
          ✅ Task 1: Model endpoint qwen3-4b-instruct is reachable
          ✅ Task 2: Showroom userdata ConfigMap contains required variables

          ⚠️ Note: This module is browser-based exploration. The checks above
          confirm your environment has the MaaS model available.
        error_msg: |
          {{ '✅' if _task1_ok else '❌' }} Task 1: Model endpoint qwen3-4b-instruct is reachable
          {{ '✅' if _task2_ok else '❌' }} Task 2: Showroom userdata ConfigMap contains required variables

          ⚠️ This module checks pre-provisioned infrastructure.
          If tasks are failing, contact your lab administrator.
